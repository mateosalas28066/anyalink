; PlatformIO Project Configuration File
;
; AnyaLink ESP32 node (dispensador + sensores)
; Heredado del proyecto ESP32_1: misma board y libs base de WiFi/MQTT/OLED.
; Extendido con DHT, HX711 y ESP32Servo para el MVP.

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

lib_deps =
  ; --- heredadas de ESP32_1 (WiFi + MQTT + OLED) ---
  knolleary/PubSubClient@^2.8
  adafruit/Adafruit SSD1306@^2.5.10
  adafruit/Adafruit GFX Library@^1.11.10

  ; --- agregadas para el MVP AnyaLink ---
  madhephaestus/ESP32Servo@^3.0.5
  adafruit/DHT sensor library@^1.4.6
  adafruit/Adafruit Unified Sensor@^1.1.14
  bogde/HX711@^0.7.5
  bblanchon/ArduinoJson@^7.0.4
